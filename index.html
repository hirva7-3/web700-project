<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Bluebell Coffee</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f4fb;
      max-width: 960px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    h1 {
      font-family: Georgia, serif;
      font-size: 2.4rem;
      color: #1a2d4a;
    }

    h3 {
      font-weight: 300;
      color: #6b9bd2;
      margin-bottom: 24px;
      font-size: 1rem;
      letter-spacing: 1px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }

    input, select {
      padding: 10px 14px;
      font-size: 14px;
      border: 1.5px solid #c9dcf5;
      border-radius: 8px;
      outline: none;
      background: #fff;
      color: #1a2d4a;
    }

    input { flex: 1; min-width: 180px; }
    input:focus, select:focus { border-color: #2e5090; }

    button {
      padding: 10px 20px;
      background: #2e5090;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }

    button:hover { background: #1a2d4a; }

    #dashboard {
      display: flex;
      gap: 20px;
      margin-bottom: 12px;
      font-size: 14px;
      color: #6b7a8d;
    }

    #count { margin-bottom: 16px; font-size: 14px; color: #6b7a8d; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 3px 12px rgba(46,80,144,0.1);
    }

    th {
      background: #1a2d4a;
      color: #fff;
      padding: 12px 16px;
      text-align: left;
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    td {
      padding: 10px 16px;
      border-bottom: 1px solid #eef2f9;
      font-size: 14px;
      color: #2c3e50;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f0f4fb; }

    img { border-radius: 6px; }
  </style>
</head>
<body>

  <h1>Bluebell Coffee</h1>
  <h3>Where Every Cup Blooms</h3>

  <div class="controls">
    <input type="text" id="searchInput" placeholder="🔍 Search by name..."/>
    <select id="sortSelect">
      <option value="">Sort By</option>
      <option value="nameAsc">Name A–Z</option>
      <option value="nameDesc">Name Z–A</option>
      <option value="idAsc">ID Ascending</option>
      <option value="idDesc">ID Descending</option>
    </select>
    <button id="resetBtn">✕ Reset</button>
  </div>

  <div id="dashboard">
    <p id="totalItems"></p>
    <p id="categoryName">Category: Coffee / Tea</p>
  </div>

  <p id="count"></p>
  <div class="cards" id="cards"></div>

  <script src="js/app.js"></script>
</body>
</html>
